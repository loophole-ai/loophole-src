name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Build React
        run: npm run buildreact
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Compile
        run: npm run compile
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Build Windows exe and Installer
        run: |
          node --max-old-space-size=8192 ./node_modules/gulp/bin/gulp.js vscode-win32-x64
          node --max-old-space-size=8192 ./node_modules/gulp/bin/gulp.js vscode-win32-x64-user-setup
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: loophole-windows
          path: |
            VSCode-win32-x64/
            VSCode-win32-x64-user-setup/
          retention-days: 5
